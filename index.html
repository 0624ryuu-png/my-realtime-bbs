<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイリアルタイムBBS</title>
    <!-- Tailwind CSS (デザインを劇的におしゃれにする魔法のリンク) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome (アイコンを表示するためのリンク) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen py-10 px-4 font-sans">

    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
        
        <!-- ヘッダー部分 -->
        <div class="bg-gradient-to-r from-indigo-500 to-purple-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold tracking-wider"><i class="fa-solid fa-comments mr-2"></i>リアルタイムBBS</h1>
            <p class="text-xs text-indigo-100 mt-1">最新の書き込みが常に一番上に表示されます</p>
        </div>

        <!-- 投稿フォーム -->
        <div class="p-6 border-b border-slate-100 bg-slate-50">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">お名前</label>
                    <input type="text" id="nameInput" placeholder="名前を入力..." 
                           class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition-all text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">メッセージ</label>
                    <textarea id="messageInput" placeholder="メッセージを入力..." rows="3"
                              class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition-all text-sm resize-none"></textarea>
                </div>
                <button id="sendButton" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-md active:scale-95 flex items-center justify-center gap-2 text-sm">
                    <i class="fa-solid fa-paper-plane"></i> 書き込む
                </button>
            </div>
        </div>

        <!-- 投稿表示エリア -->
        <div class="p-6">
            <h2 class="text-sm font-bold text-slate-400 mb-4 flex items-center gap-2">
                <i class="fa-solid fa-clock-rotate-left"></i> タイムライン
            </h2>
            <div id="posts" class="space-y-4 max-h-[400px] overflow-y-auto pr-2">
                <!-- ここに投稿がJavaScriptで自動追加されます -->
                <div class="text-center text-slate-400 py-8 text-sm">投稿を読み込んでいます...</div>
            </div>
        </div>

    </div>

    <!-- Firebase SDKの読み込み (v10を使用) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ あなたのFirebaseの「firebaseConfig」に書き換えてください！
        const firebaseConfig = {
            apiKey: "AIzaSyCPhwUClKwVuyNS_tUFug2c508SzyCrdYw",
            authDomain: "my-bbs-app-1b757.firebaseapp.com",
            projectId: "my-bbs-app-1b757",
            storageBucket: "my-bbs-app-1b757.firebasestorage.app",
            messagingSenderId: "54518459021",
            appId: "1:54518459021:web:f019dd40fb72d29f0250c4"
        };


        // Firebaseの初期化
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const postsCollection = collection(db, "posts");

        const nameInput = document.getElementById("nameInput");
        const messageInput = document.getElementById("messageInput");
        const sendButton = document.getElementById("sendButton");
        const postsDiv = document.getElementById("posts");

        // ローカルストレージから名前を復元（地味に便利なオートセーブ機能！）
        const savedName = localStorage.getItem("saved_name");
        if (savedName) {
            nameInput.value = savedName;
        }

        // 送信処理
        sendButton.addEventListener("click", async () => {
            const name = nameInput.value.trim();
            const message = messageInput.value.trim();

            if (!name || !message) {
                alert("名前とメッセージを入力してください！");
                return;
            }

            // 名前をブラウザに保存（次回から入力不要に）
            localStorage.setItem("saved_name", name);

            try {
                // 💡 【アップデート箇所】createdAtにサーバー上の現在時刻（serverTimestamp）を乗せて保存します
                await addDoc(postsCollection, {
                    name: name,
                    message: message,
                    createdAt: serverTimestamp()
                });
                messageInput.value = ""; // 入力欄をクリア
            } catch (error) {
                console.error("送信エラー: ", error);
                alert("送信に失敗しました。ルール設定などを確認してください。");
            }
        });

        // 💡 【アップデート箇所】データを「createdAt」の「desc（新しい順）」に並び替えるクエリを作成
        const q = query(postsCollection, orderBy("createdAt", "desc"));

        // リアルタイムでデータを監視して表示
        onSnapshot(q, (snapshot) => {
            postsDiv.innerHTML = ""; // 一旦リセット

            if (snapshot.empty) {
                postsDiv.innerHTML = `<div class="text-center text-slate-400 py-8 text-sm">最初の投稿を書き込んでみましょう！</div>`;
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                
                // 時刻の変換処理（まだ保存されたばかりでサーバー時刻が未確定の場合は、今のスマホやPCの時間で仮表示する）
                let timeStr = "";
                if (data.createdAt) {
                    const date = data.createdAt.toDate();
                    timeStr = `${date.getMonth() + 1}/${date.getDate()} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
                } else {
                    const date = new Date();
                    timeStr = `${date.getMonth() + 1}/${date.getDate()} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')} (送信中)`;
                }

                // 1つの投稿カードを作成
                const postElement = document.createElement("div");
                postElement.className = "bg-slate-50 p-4 rounded-2xl border border-slate-100 shadow-sm transition-all hover:shadow-md";
                postElement.innerHTML = `
                    <div class="flex justify-between items-center mb-1.5">
                        <span class="font-bold text-slate-800 text-sm"><i class="fa-solid fa-user-astronaut text-indigo-400 mr-1"></i> ${escapeHtml(data.name)}</span>
                        <span class="text-[10px] text-slate-400 font-mono">${timeStr}</span>
                    </div>
                    <p class="text-slate-600 text-sm leading-relaxed whitespace-pre-wrap">${escapeHtml(data.message)}</p>
                `;
                postsDiv.appendChild(postElement);
            });
        });

        // セキュリティ対策（安全に文字を表示するための関数）
        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>'"]/g, (tag) => {
                const chars = { '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' };
                return chars[tag] || tag;
            });
        }
    </script>
</body>
</html>
